<script>
let globalData = {am:0,pm:0,criteria:'', acciones:''};

function nav(n){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('p'+n).classList.add('active');
}

function exclusion(){
  document.getElementById('alerta').style.display='block';
}

function mostrarInicio(){
  document.getElementById('criterios').style.display='block';
}

/* =========================
INICIO INSULINA
========================= */
function calcularInicioMejorado() {

  const peso = parseFloat(document.getElementById('peso-paciente').value);
  const factor = parseFloat(document.getElementById('factor-dosis').value);
  const sel = Array.from(document.querySelectorAll('.c:checked')).map(c => c.value);

  if (!peso || peso <= 0) {
    alert("Ingrese un peso válido.");
    return;
  }

  if (sel.length === 0) {
    alert("Seleccione al menos un criterio de inicio.");
    return;
  }

  globalData.criteria = sel.join(', ');

  const total = Math.max(4, Math.round(peso * factor));
  const am = Math.round(total * 0.66);
  const pm = total - am;

  globalData.am = am;
  globalData.pm = pm;

  const preview = document.getElementById('preview-dosis');
  preview.style.display = 'block';
  preview.innerHTML = `
  Dosis total: ${total} UI/día<br><br>
  • Mañana: ${am} UI<br>
  • Noche: ${pm} UI
  `;

  const nota = `INICIO
Paciente con criterios de inicio de insulina bajo ${globalData.criteria}.
Se inicia insulina NPH en dosis de:
- ${am} unidades antes del desayuno
- ${pm} unidades antes de dormir

Educación por enfermería para inicio de insulina.
Evaluación por nutricionista.
Control médico en 15 días con seguimiento de glicemia en ayunas y preprandial vespertino.`;

  document.getElementById('nota-clinica').innerText = nota;

  setTimeout(() => nav(5), 500);
}

/* =========================
PREPARAR SEGUIMIENTO
========================= */
function prepSeg() {
  const tbody = document.getElementById('tabla-seguimiento');
  tbody.innerHTML = "";

  for (let i = 1; i <= 15; i++) {
    tbody.innerHTML += `
    <tr>
      <td style="font-weight:600;">${i}</td>
      <td><input class="ay glicemia" type="text" maxlength="3"></td>
      <td><input class="pre glicemia" type="text" maxlength="3"></td>
    </tr>`;
  }

  nav(4);
}

/* =========================
SEGUIMIENTO PRO
========================= */
function calcularSeguimientoPro() {

  const peso = parseFloat(document.getElementById('peso-seguimiento').value);
  const tipo = document.getElementById('tipo-esquema').value;

  let am = parseInt(document.getElementById('am-actual').value);
  let pm = parseInt(document.getElementById('pm-actual').value);

  if (!peso || peso <= 0) {
    alert("Ingrese peso válido.");
    return;
  }

  if (
    (tipo === "2" && (isNaN(am) || isNaN(pm))) ||
    (tipo === "am" && isNaN(am)) ||
    (tipo === "pm" && isNaN(pm))
  ) {
    alert("Ingrese dosis válidas.");
    return;
  }

  am = Math.min(99, Math.max(4, am || 0));
  pm = Math.min(99, Math.max(4, pm || 0));

  const ayunas = Array.from(document.querySelectorAll('.ay'))
    .map(i => parseInt(i.value))
    .filter(v => !isNaN(v));

  const preonce = Array.from(document.querySelectorAll('.pre'))
    .map(i => parseInt(i.value))
    .filter(v => !isNaN(v));

  if (ayunas.length < 3) {
    alert("Ingrese al menos 3 glicemias en ayunas.");
    return;
  }

  if (preonce.length > 0 && preonce.length < 3) {
    alert("Ingrese al menos 3 glicemias preprandiales.");
    return;
  }

  const promAy = ayunas.reduce((a,b)=>a+b,0)/ayunas.length;
  const promPre = preonce.length ? preonce.reduce((a,b)=>a+b,0)/preonce.length : null;

  let ajusteAM = 0;
  let ajustePM = 0;
  let alerta = "";
  let explicacion = "";

  /* AJUSTE AYUNAS */
  if (promAy >= 250) {
    ajustePM = 6;
    explicacion += "↑ Insulina nocturna (muy elevado)\n";
  }
  else if (promAy > 180) {
    ajustePM = 4;
    explicacion += "↑ Insulina nocturna\n";
  }
  else if (promAy > 130) {
    ajustePM = 2;
    explicacion += "↑ leve nocturna\n";
  }
  else if (promAy < 70) {
    ajustePM = -2;
    alerta += "⚠️ Hipoglicemia en ayunas\n";
  }

  /* AJUSTE PREPRANDIAL */
  if (promPre !== null) {
    if (promPre >= 250) ajusteAM = 6;
    else if (promPre > 180) ajusteAM = 4;
    else if (promPre > 130) ajusteAM = 2;
    else if (promPre < 70) {
      ajusteAM = -2;
      alerta += "⚠️ Hipoglicemia vespertina\n";
    }
  }

  let nuevaAM = (tipo !== "pm") ? Math.min(99, Math.max(4, am + ajusteAM)) : 0;
  let nuevaPM = (tipo !== "am") ? Math.min(99, Math.max(4, pm + ajustePM)) : 0;

  const total = nuevaAM + nuevaPM;
  const dosisKg = total / peso;

  if (total > peso) {
    alerta += "⚠️ Ajuste limitado a 1 UI/kg\n";
    const factor = peso / total;
    nuevaAM = Math.round(nuevaAM * factor);
    nuevaPM = Math.round(nuevaPM * factor);
  }

  globalData.am = nuevaAM;
  globalData.pm = nuevaPM;

  const nota = `
SEGUIMIENTO INSULINA NPH

Promedio ayunas: ${Math.round(promAy)} mg/dL
${promPre !== null ? "Promedio preprandial: " + Math.round(promPre) + " mg/dL" : ""}

Dosis previa:
- AM: ${am}
- PM: ${pm}

Nueva dosis:
- AM: ${nuevaAM}
- PM: ${nuevaPM}

${explicacion}

${alerta}
`;

  document.getElementById('nota-clinica').innerText = nota;

  nav(5);
}

/* =========================
COPIAR NOTA
========================= */
function copiarNota(){
  const text = document.getElementById('nota-clinica').innerText;
  navigator.clipboard.writeText(text);
  alert("Nota copiada");
}

/* =========================
PDF
========================= */
function generarPDF(esSeguimiento) {
  const tipo = esSeguimiento ? "seguimiento" : "pscv";
  nav(6);
  setTimeout(() => generarDocumento(tipo), 200);
}

/* =========================
RESET TOTAL
========================= */
function resetTotal() {

  globalData = {am:0,pm:0,criteria:'', acciones:''};

  document.querySelectorAll('input').forEach(i => i.value='');
  document.querySelectorAll('input[type=checkbox]').forEach(c => c.checked=false);

  const preview = document.getElementById('preview-dosis');
  if (preview) preview.style.display = 'none';

  const resumen = document.getElementById('resumen-promedios');
  if (resumen) resumen.style.display = 'none';

  const alertaAlta = document.getElementById('alerta-dosis-alta');
  if (alertaAlta) alertaAlta.style.display = 'none';

  document.getElementById('nota-clinica').innerText = '';
  document.getElementById('pdf').innerHTML = '';
}

function finalizar() {
  resetTotal();
  nav(0);
}
</script>
