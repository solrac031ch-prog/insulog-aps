<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Protocolo de Insulinización APS - Dr. Herrera</title>

<style>
:root {
  --primary:#0052cc;
  --danger:#ff5630;
  --success:#36b37e;
  --warning:#ffab00;
}

body {
  font-family:Segoe UI;
  background:#ebecf0;
  padding:20px;
}

.container {
  max-width:900px;
  margin:auto;
  background:white;
  padding:40px;
  border-radius:15px;
}

.page { display:none; }
.active { display:block; }

.btn {
  width:100%;
  padding:14px;
  margin:10px 0;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
}

.btn-main { background:var(--primary); color:white; }
.btn-danger { background:var(--danger); color:white; }
.btn-success { background:var(--success); color:white; }

input, select {
  width:100%;
  padding:10px;
  margin:5px 0;
}

.nota {
  background:#091e42;
  color:#00fbff;
  padding:20px;
  border-radius:10px;
  white-space:pre-wrap;
}

table {
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
}

td, th {
  border:1px solid #ccc;
  padding:6px;
  text-align:center;
}

footer {
  text-align:center;
  margin-top:20px;
  font-size:12px;
}

@media print {
  @page { size: letter; }
  .btn, footer { display:none; }
}
</style>
</head>

<body>

<div class="container">

<!-- P0 -->
<div id="p0" class="page active" style="text-align:center;">

<h1 style="color:#0052cc;">Insulog APS</h1>

<p style="font-weight:600;">
Insulinización en Atención Primaria de Salud
</p>

<button class="btn btn-main" onclick="nav(1)">
INICIAR ALGORITMO
</button>

</div>

<!-- P1 -->
<div id="p1" class="page" style="text-align:center;">

<h2>Evaluación inicial</h2>

<p>¿DM1, embarazo, pancreatitis, menor de 18 años?</p>

<button class="btn btn-danger" onclick="exclusion()">SÍ</button>
<button class="btn btn-main" onclick="nav(2)">NO</button>

<div id="alerta" style="display:none;background:#ffe9e9;padding:20px;margin-top:20px;">
Derivar a nivel secundario
</div>

</div>

<!-- P2 -->
<div id="p2" class="page">

<h2>Definición del proceso</h2>

<button class="btn btn-main" onclick="mostrarInicio()">INICIO INSULINA</button>

<div id="criterios" style="display:none;">

<label><input type="checkbox" class="c" value="HbA1c > 9%"> HbA1c > 9%</label><br>
<label><input type="checkbox" class="c" value="Glicemia > 250"> Glicemia > 250</label><br>
<label><input type="checkbox" class="c" value="Fracaso oral"> Fracaso oral</label><br>

<button class="btn btn-main" onclick="nav(3)">
SIGUIENTE
</button>

</div>

</div>

<!-- P3 -->
<div id="p3" class="page">

<h2>Dosificación</h2>

<input type="number" id="peso-paciente" placeholder="Peso kg">

<select id="factor-dosis">
<option value="0.1">Alto riesgo</option>
<option value="0.2" selected>Estándar</option>
<option value="0.3">Bajo riesgo</option>
</select>

<div id="preview-dosis"></div>

<button class="btn btn-main" onclick="calcularInicioMejorado()">
CALCULAR
</button>

</div>

<!-- P4 -->
<div id="p4" class="page">

<h2>Seguimiento</h2>

<input type="number" id="peso-seguimiento" placeholder="Peso">

<input id="am-actual" placeholder="AM">
<input id="pm-actual" placeholder="PM">

<table>
<tbody id="tabla-seguimiento"></tbody>
</table>

<button class="btn btn-main" onclick="prepSeg()">
GENERAR TABLA
</button>

<button class="btn btn-success" onclick="calcularSeguimientoPro()">
AJUSTAR
</button>

</div>

<!-- P5 -->
<div id="p5" class="page">

<h2>Nota clínica</h2>

<div id="nota-clinica" class="nota"></div>

<button class="btn btn-success" onclick="copiarNota()">
COPIAR
</button>

</div>

</div>

<script>

/* =========================
   GLOBAL
========================= */
let globalData = {
  am:0,
  pm:0,
  criteria:'',
  acciones:''
};

/* =========================
   NAV
========================= */
function nav(n){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('p'+n).classList.add('active');
}

/* =========================
   EXCLUSION
========================= */
function exclusion(){
  document.getElementById('alerta').style.display='block';
}

/* =========================
   CRITERIOS
========================= */
function mostrarInicio(){
  document.getElementById('criterios').style.display='block';
}

/* =========================
   INICIO INSULINA
========================= */
function calcularInicioMejorado(){

  const peso = parseFloat(document.getElementById('peso-paciente').value);
  const factor = parseFloat(document.getElementById('factor-dosis').value);

  if(!peso) return alert("Peso inválido");

  const sel = Array.from(document.querySelectorAll('.c:checked')).map(c=>c.value);
  if(sel.length===0) return alert("Seleccione criterios");

  globalData.criteria = sel.join(",");

  const total = Math.max(4, Math.round(peso*factor));
  const am = Math.round(total*0.66);
  const pm = total-am;

  globalData.am=am;
  globalData.pm=pm;

  document.getElementById('preview-dosis').innerHTML =
  `Total: ${total} UI<br>AM: ${am}<br>PM: ${pm}`;

  nav(5);

  document.getElementById('nota-clinica').innerText =
  `INICIO INSULINA

Criterios: ${globalData.criteria}

AM: ${am} UI
PM: ${pm} UI`;
}

/* =========================
   TABLA
========================= */
function prepSeg(){
  let t=document.getElementById('tabla-seguimiento');
  t.innerHTML='';
  for(let i=1;i<=10;i++){
    t.innerHTML+=`
    <tr>
      <td>${i}</td>
      <td><input></td>
      <td><input></td>
    </tr>`;
  }
  nav(4);
}

/* =========================
   SEGUIMIENTO
========================= */
function calcularSeguimientoPro(){

  let am=parseInt(document.getElementById('am-actual').value);
  let pm=parseInt(document.getElementById('pm-actual').value);

  if(!am||!pm) return alert("Completar dosis");

  let nota=`SEGUIMIENTO

AM: ${am}
PM: ${pm}`;

  document.getElementById('nota-clinica').innerText=nota;

  nav(5);
}

/* =========================
   COPIAR
========================= */
function copiarNota(){
  navigator.clipboard.writeText(
    document.getElementById('nota-clinica').innerText
  );
  alert("Copiado");
}

</script>

</body>
</html>
